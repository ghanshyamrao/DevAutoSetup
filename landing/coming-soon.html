<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | DevOnboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d16;
      --card: #121528;
      --border: #252b4a;
      --text: #e8e9f2;
      --muted: #b8bdd5;
      --accent: #9c7dff;
    }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1a1f3d 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }
    p {
      color: var(--muted);
      margin-bottom: 20px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Coming Soon</h1>
    <p>This page is under development and will be available soon.</p>
    <a href="index.html">&larr; Back to DevOnboard</a>
  </main>
</body>
</html>
